<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolaPintar - Latihan Fondasi Bilangan</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/330/330803.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #FAFAFA; color: #2E3A49; }
        .kuis-container { max-width: 700px; margin: 40px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-kuis { text-align: center; margin-bottom: 30px; border-bottom: 2px dashed #E2E8F0; padding-bottom: 20px; }
        
        .soal-teks { font-size: 18px; line-height: 1.6; margin-bottom: 25px; font-weight: 600; }
        .opsi-list { display: flex; flex-direction: column; gap: 12px; }
        .opsi-item { 
            padding: 15px 20px; 
            border: 2px solid #E2E8F0; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 16px;
        }
        .opsi-item:hover { border-color: #FFB800; background-color: #FFFDF5; }
        .opsi-item.terpilih { border-color: #FFB800; background-color: #FFB800; color: white; font-weight: bold; }

        .btn-lanjut { background-color: #2E3A49; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'Poppins'; font-weight: 600; cursor: pointer; margin-top: 30px; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-lanjut:hover { background-color: #1E293B; }
        .btn-lanjut:disabled { background-color: #CBD5E1; cursor: not-allowed; }

        #layarHasil { display: none; text-align: center; }
        .skor-box { font-size: 60px; font-weight: 700; color: #FFB800; margin: 20px 0; }
        .statistik { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .stat-item { background: #F8FAFC; padding: 15px 25px; border-radius: 10px; }
        .stat-benar { color: #10B981; font-weight: bold; font-size: 20px; }
        .stat-salah { color: #EF4444; font-weight: bold; font-size: 20px; }

        .aksi-ganda { display: flex; gap: 15px; justify-content: center; }
        .btn-pembahasan { background-color: white; color: #2E3A49; border: 2px solid #2E3A49; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-pembahasan:hover { background-color: #F1F5F9; }
        .btn-materi-lanjut { background-color: #FFB800; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 184, 0, 0.3); }
        .btn-materi-lanjut:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 184, 0, 0.4); }
    </style>
</head>
<body>

    <div class="kuis-container">
        <div id="layarKuis">
            <div class="header-kuis">
                <span style="color: #64748B; font-size: 14px;">Latihan Fondasi Bilangan</span>
                <h2 style="margin: 5px 0 0 0;" id="indikatorSoal">Soal 1 / 5</h2>
            </div>

            <div class="soal-teks" id="teksSoal">Memuat soal...</div>
            <div class="opsi-list" id="wadahOpsi"></div>

            <button id="btnLanjut" class="btn-lanjut" disabled>Pilih jawaban dulu</button>
        </div>

        <div id="layarHasil">
            <h2>Latihan Selesai! 🎉</h2>
            <p>Kerja bagus! Berikut adalah hasil pengerjaanmu:</p>
            <div class="skor-box" id="nilaiAkhir">0</div>
            <div class="statistik">
                <div class="stat-item">
                    <div style="font-size: 14px; color: #64748B;">Benar</div>
                    <div class="stat-benar" id="jmlBenar">0</div>
                </div>
                <div class="stat-item">
                    <div style="font-size: 14px; color: #64748B;">Salah</div>
                    <div class="stat-salah" id="jmlSalah">0</div>
                </div>
            </div>
            <div class="aksi-ganda">
                <a href="pembahasan1.html" class="btn-pembahasan">Lihat Pembahasan</a>
                <button class="btn-materi-lanjut" onclick="bukaMateriBerikutnya()">Materi Berikutnya 🔓</button>
            </div>
        </div>
    </div>

    <script>
        // Data Soal dari Bahan yang kamu berikan
        const bankSoal = [
            {
                pertanyaan: "Diberikan barisan bilangan: 4, 7, 10, 13, ... <br>Berapakah nilai suku ke-5 (U<sub>5</sub>) dari barisan tersebut?",
                opsi: ["15", "16", "17", "18"],
                jawabanBenar: 1 // 16
            },
            {
                pertanyaan: "Jika sebuah barisan memiliki pola 'dikali 2 untuk suku berikutnya', dan suku pertamanya adalah 3, maka suku ke-4 (U<sub>4</sub>) adalah...",
                opsi: ["12", "18", "24", "48"],
                jawabanBenar: 2 // 24
            },
            {
                pertanyaan: "Manakah di bawah ini yang merupakan rumus U<sub>n</sub> untuk barisan bilangan asli genap (2, 4, 6, 8, ...)?",
                opsi: ["U<sub>n</sub> = n + 2", "U<sub>n</sub> = 2n", "U<sub>n</sub> = 2<sup>n</sup>", "U<sub>n</sub> = n<sup>2</sup>"],
                jawabanBenar: 1 // 2n
            },
            {
                pertanyaan: "Diketahui rumus suku ke-n adalah U<sub>n</sub> = 3n - 1. Berapakah nilai dari suku ke-10?",
                opsi: ["29", "30", "31", "39"],
                jawabanBenar: 0 // 29
            },
            {
                pertanyaan: "Perhatikan pola ini: 1, 4, 9, 16, ... <br>Angka berikutnya (U<sub>5</sub>) untuk melengkapi barisan tersebut adalah...",
                opsi: ["20", "24", "25", "30"],
                jawabanBenar: 2 // 25
            }
        ];

        let soalSekarang = 0;
        let skorBenar = 0;
        let jawabanTerpilih = null;

        const teksSoal = document.getElementById("teksSoal");
        const wadahOpsi = document.getElementById("wadahOpsi");
        const btnLanjut = document.getElementById("btnLanjut");
        const indikatorSoal = document.getElementById("indikatorSoal");
        const layarKuis = document.getElementById("layarKuis");
        const layarHasil = document.getElementById("layarHasil");

        function muatSoal() {
            jawabanTerpilih = null;
            btnLanjut.disabled = true;
            btnLanjut.innerText = "Pilih jawaban dulu";
            indikatorSoal.innerText = `Soal ${soalSekarang + 1} / ${bankSoal.length}`;
            teksSoal.innerHTML = bankSoal[soalSekarang].pertanyaan;
            wadahOpsi.innerHTML = "";
            bankSoal[soalSekarang].opsi.forEach((teks, index) => {
                const divOpsi = document.createElement("div");
                divOpsi.className = "opsi-item";
                divOpsi.innerHTML = teks;
                divOpsi.onclick = () => pilihJawaban(index, divOpsi);
                wadahOpsi.appendChild(divOpsi);
            });
        }

        function pilihJawaban(index, elemenDiv) {
            jawabanTerpilih = index;
            document.querySelectorAll(".opsi-item").forEach(o => o.classList.remove("terpilih"));
            elemenDiv.classList.add("terpilih");
            btnLanjut.disabled = false;
            btnLanjut.innerText = (soalSekarang === bankSoal.length - 1) ? "Kumpulkan Jawaban" : "Lanjut";
        }

        btnLanjut.addEventListener("click", () => {
            if (jawabanTerpilih === bankSoal[soalSekarang].jawabanBenar) skorBenar++;
            soalSekarang++;
            if (soalSekarang < bankSoal.length) muatSoal();
            else tampilkanHasil();
        });

        function tampilkanHasil() {
            layarKuis.style.display = "none";
            layarHasil.style.display = "block";
            const nilai = Math.round((skorBenar / bankSoal.length) * 100);
            document.getElementById("nilaiAkhir").innerText = nilai;
            document.getElementById("jmlBenar").innerText = skorBenar;
            document.getElementById("jmlSalah").innerText = bankSoal.length - skorBenar;
        }

        function bukaMateriBerikutnya() {
            localStorage.setItem('progressMateri', 'lulus-materi-1');
            window.location.href = 'dashboard.html';
        }

        muatSoal();
    </script>
</body>
</html>
