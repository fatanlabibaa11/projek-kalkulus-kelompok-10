<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolaPintar - Latihan Barisan Geometri</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };</script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #FAFAFA; color: #2E3A49; }
        .kuis-container { max-width: 700px; margin: 40px auto; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-kuis { text-align: center; margin-bottom: 30px; border-bottom: 2px dashed #E2E8F0; padding-bottom: 20px; }
        .soal-teks { font-size: 18px; line-height: 1.6; margin-bottom: 25px; font-weight: 600; }
        .opsi-list { display: flex; flex-direction: column; gap: 12px; }
        .opsi-item { padding: 15px 20px; border: 2px solid #E2E8F0; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .opsi-item:hover { border-color: #FFB800; background-color: #FFFDF5; }
        .opsi-item.terpilih { border-color: #FFB800; background-color: #FFB800; color: white; font-weight: bold; }
        .btn-lanjut { background-color: #2E3A49; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'Poppins'; font-weight: 600; cursor: pointer; margin-top: 30px; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-lanjut:hover { background-color: #1E293B; }
        .btn-lanjut:disabled { background-color: #CBD5E1; cursor: not-allowed; }
        #layarHasil { display: none; text-align: center; }
        .skor-box { font-size: 60px; font-weight: 700; color: #FFB800; margin: 20px 0; }
        .statistik { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .stat-item { background: #F8FAFC; padding: 15px 25px; border-radius: 10px; }
        .stat-benar { color: #10B981; font-weight: bold; font-size: 20px; }
        .stat-salah { color: #EF4444; font-weight: bold; font-size: 20px; }
        .aksi-ganda { display: flex; gap: 15px; justify-content: center; }
        .btn-pembahasan { background-color: white; color: #2E3A49; border: 2px solid #2E3A49; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; text-decoration: none; }
        .btn-pembahasan:hover { background-color: #F1F5F9; }
        .btn-materi-lanjut { background-color: #FFB800; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

    <div class="kuis-container">
        <div id="layarKuis">
            <div class="header-kuis">
                <span style="color: #64748B; font-size: 14px;">Latihan Barisan Geometri</span>
                <h2 style="margin: 5px 0 0 0;" id="indikatorSoal">Soal 1 / 5</h2>
            </div>
            <div class="soal-teks" id="teksSoal">Memuat soal...</div>
            <div class="opsi-list" id="wadahOpsi"></div>
            <button id="btnLanjut" class="btn-lanjut" disabled>Pilih jawaban dulu</button>
        </div>

        <div id="layarHasil">
            <h2>Latihan Selesai! 🎉</h2>
            <div class="skor-box" id="nilaiAkhir">0</div>
            <div class="statistik">
                <div class="stat-item"><div style="font-size: 14px;">Benar</div><div class="stat-benar" id="jmlBenar">0</div></div>
                <div class="stat-item"><div style="font-size: 14px;">Salah</div><div class="stat-salah" id="jmlSalah">0</div></div>
            </div>
            <div class="aksi-ganda">
                <a href="pembahasan3.html" class="btn-pembahasan">Lihat Pembahasan</a>
                <button class="btn-materi-lanjut" onclick="bukaDashboard()">Kembali ke Dashboard 🔓</button>
            </div>
        </div>
    </div>

    <script>
        // Kuncinya aku ganti jadi "pertanyaan" biar persis sama kayak latihan2
        const bankSoal = [
            {
                pertanyaan: "Pada barisan geometri, perbandingan tetap antar suku disebut...",
                opsi: ["Selisih", "Beda", "Rasio", "Variabel"],
                jawabanBenar: 2 // C (Rasio)
            },
            {
                pertanyaan: "Berapakah rasio ($r$) dari barisan $2, 6, 18, 54, \\dots$?",
                opsi: ["$2$", "$3$", "$4$", "$6$"],
                jawabanBenar: 1 // B (3)
            },
            {
                pertanyaan: "Jika suku pertama ($a$) adalah $5$ dan rasio ($r$) adalah $2$, berapakah nilai dari $U_4$?",
                opsi: ["$20$", "$30$", "$40$", "$50$"],
                jawabanBenar: 2 // C (40)
            },
            {
                pertanyaan: "Rumus umum suku ke-$n$ untuk barisan geometri adalah...",
                opsi: ["$U_n = a + (n-1)b$", "$U_n = a \\cdot r^{n-1}$", "$U_n = a \\cdot r^n$", "$U_n = n^2 + a$"],
                jawabanBenar: 1 // B
            },
            {
                pertanyaan: "Suku pertama dari barisan geometri $32, 16, 8, 4, \\dots$ adalah...",
                opsi: ["$32$", "$16$", "$2$", "$1/2$"],
                jawabanBenar: 0 // A (32)
            }
        ];

        let soalSekarang = 0; let skorBenar = 0; let jawabanTerpilih = null;

        function muatSoal() {
            jawabanTerpilih = null;
            document.getElementById("btnLanjut").disabled = true;
            document.getElementById("btnLanjut").innerText = "Pilih jawaban dulu";
            document.getElementById("indikatorSoal").innerText = `Soal ${soalSekarang + 1} / ${bankSoal.length}`;
            document.getElementById("teksSoal").innerHTML = bankSoal[soalSekarang].pertanyaan;
            
            const wadahOpsi = document.getElementById("wadahOpsi");
            wadahOpsi.innerHTML = "";
            bankSoal[soalSekarang].opsi.forEach((teks, index) => {
                const div = document.createElement("div");
                div.className = "opsi-item";
                div.innerHTML = teks;
                div.onclick = () => pilihJawaban(index, div);
                wadahOpsi.appendChild(div);
            });
            
            if (window.MathJax) { MathJax.typesetPromise(); }
        }

        function pilihJawaban(index, elemenDiv) {
            jawabanTerpilih = index;
            document.querySelectorAll(".opsi-item").forEach(o => o.classList.remove("terpilih"));
            elemenDiv.classList.add("terpilih");
            document.getElementById("btnLanjut").disabled = false;
            document.getElementById("btnLanjut").innerText = (soalSekarang === bankSoal.length - 1) ? "Kumpulkan Jawaban" : "Lanjut";
        }

        document.getElementById("btnLanjut").addEventListener("click", () => {
            if (jawabanTerpilih === bankSoal[soalSekarang].jawabanBenar) skorBenar++;
            soalSekarang++;
            if (soalSekarang < bankSoal.length) muatSoal();
            else tampilkanHasil();
        });

        function tampilkanHasil() {
            document.getElementById("layarKuis").style.display = "none";
            document.getElementById("layarHasil").style.display = "block";
            document.getElementById("nilaiAkhir").innerText = Math.round((skorBenar / bankSoal.length) * 100);
            document.getElementById("jmlBenar").innerText = skorBenar;
            document.getElementById("jmlSalah").innerText = bankSoal.length - skorBenar;
        }

        function bukaDashboard() {
            // Kunci buat buka materi 4
            localStorage.setItem('progressMateri', 'lulus-materi-3');
            window.location.href = 'dashboard.html';
        }

        muatSoal();
    </script>
</body>
</html>
